[build]
  environment = { NPM_FLAGS = "--loglevel=error" }

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/*"
  function = "markdown"
  excludedPath = [
    "/.netlify/*",
    "/.well-known/*",
    "/_next/*",
    "/api/*",
    "/animations/*",
    "/favicon/*",
    "/fonts/*",
    "/images/*",
    "/lottie-assets/*",
    "/next-sitemap*",
    "/og-images/*",
    "/page-data/*",
    "/social-previews/*",
    "/static/*",
    "/videos/*",
    "/agents.md",
    "/auth.md",
    "/llms.txt",
    "/robots.txt",
    "/sitemap.md",
    "/sw.js",
    "/*.avif",
    "/*.css",
    "/*.csv",
    "/*.gif",
    "/*.ico",
    "/*.jpeg",
    "/*.jpg",
    "/*.js",
    "/*.json",
    "/*.map",
    "/*.mjs",
    "/*.mp3",
    "/*.mp4",
    "/*.pdf",
    "/*.png",
    "/*.riv",
    "/*.svg",
    "/*.ttf",
    "/*.wasm",
    "/*.webm",
    "/*.webmanifest",
    "/*.webp",
    "/*.woff",
    "/*.woff2",
    "/*.xml",
    "/blog",
    "/blog/*",
    "/changelog",
    "/changelog/*",
    "/customers",
    "/customers/*",
    "/comparison/*",
    "/integrations",
    "/integrations/*",
    "/copilot",
    "/copilot/*",
    "/mcp",
    "/mcp/*",
    "/pricing",
    "/pricing.md",
    "/book-a-demo",
    "/book-a-demo.md",
    "/book-a-demo-connect",
    "/book-a-demo-connect.md",
    "/connect",
    "/connect.md",
    "/aci",
    "/aci.md",
    "/dpa",
    "/dpa.md",
    "/privacy",
    "/privacy.md",
    "/terms",
    "/terms.md"
  ]

